<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
 
  <!-- Header -->
  <header class="pokedex-header">
    <h1>Pokédex</h1>
    <p>Explore os Pokémon da 1ª geração</p>
  </header>
 
  <div class="container-fluid px-3 px-md-4" style="max-width: 1200px; margin: 0 auto;">
 
    <!-- Busca -->
    <div class="busca-wrap">
      <input id="busca" class="busca-input" type="text" placeholder="Buscar por nome ou ID...">
      <button id="btn-buscar" class="btn-busca">Buscar</button>
      <button id="btn-limpar" class="btn-limpar" style="display:none">✕ Limpar</button>
    </div>
 
    <!-- Erro -->
    <div id="erro" class="d-none"></div>
 
    <!-- Loading -->
    <div id="loading">
      <div class="spinner"></div>
      Carregando Pokémon...
    </div>
 
    <!-- Lista de cards -->
    <div id="lista" class="row g-3"></div>
 
    <!-- Carregar mais -->
    <div class="btn-mais-wrap">
      <button id="btn-mais" style="display:none">Próximo Pokémon</button>
    </div>
 
  </div>

  <!-- Modal de Detalhes -->
  <div id="modal-detalhes" class="modal-overlay d-none">
    <div class="modal-conteudo">
      <button id="btn-fechar-modal" class="btn-fechar-modal">✕</button>
      <div id="detalhes-conteudo"></div>
    </div>
  </div>
 
  <!-- Script -->
  <script  src="js/script.js"></script>
</body>
</html>
